<!DOCTYPE html>
<html lang="bn">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="Coinstore.bd payment page. Nirapode apnar paymentti somponno korun ekhane.">
    <title>Payment - Coinstore.bd Online Business Payment</title>
    <link href="css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css">
    <style>
        body { background: #0a192f; color: #fff; font-family: 'Segoe UI', sans-serif; padding-bottom: 50px; }
        .app-card { background: #0e1d35; border-radius: 24px; border: 1px solid rgba(46, 204, 113, 0.2); padding: 40px; box-shadow: 0 10px 30px rgba(0,0,0,0.3); }
        .btn-tiktok { 
            background: linear-gradient(90deg, #2ecc71, #27ae60); 
            color: #fff; 
            border: none; 
            padding: 14px; 
            font-weight: 700; 
            border-radius: 12px; 
            transition: 0.3s;
        }
        .btn-tiktok:hover { 
            transform: translateY(-2px); 
            box-shadow: 0 5px 15px rgba(46, 204, 113, 0.3);
        }
        .form-control, .form-select { background: rgba(255, 255, 255, 0.05); border: 1px solid rgba(255, 255, 255, 0.1); color: white; border-radius: 12px; padding: 12px; }
        .form-control::placeholder { color: rgba(255, 255, 255, 0.4); }
        .form-control:focus, .form-select:focus { background: rgba(255, 255, 255, 0.08); color: white; border-color: #2ecc71; outline: none; }
        .form-select option { background: #0e1d35; color: white; }
        .payment-info { background: rgba(46, 204, 113, 0.1); border: 1px solid rgba(46, 204, 113, 0.2); border-radius: 16px; padding: 20px; }
        .text-tiktok { color: #2ecc71; }
    </style>
</head>
<body>
    <!-- Error Alert Container -->
    <div id="alert_container" class="container mt-3" style="display: none;">
        <div id="alert_box" class="alert alert-danger rounded-4 shadow-sm" role="alert">
            <span id="alert_message"></span>
        </div>
    </div>

    <div class="container mt-4">
        <div class="app-card shadow-lg mx-auto" style="max-width: 550px;">
            <div class="text-center mb-4">
                <h3 class="fw-bold">পেমেন্ট সম্পন্ন করুন</h3>
                <p class="text-white-50 small">আপনার পেমেন্টটি নিশ্চিত করতে নিচের ধাপগুলো অনুসরণ করুন</p>
            </div>
            
            <form action="#" method="POST" onsubmit="return validateForm()">
                <div class="mb-4">
                    <label class="form-label text-white-50 small"><i class="bi bi-caret-right-fill me-1 text-tiktok"></i>আপনার ফোন নম্বর</label>
                    <input type="text" id="phone_input" class="form-control" placeholder="01XXXXXXXXX">
                </div>

                <div class="mb-4">
                    <label class="form-label text-white-50 small"><i class="bi bi-caret-right-fill me-1 text-tiktok"></i>পেমেন্ট মাধ্যম</label>
                    <div class="position-relative">
                        <select class="form-select" id="payment_method" onchange="showPaymentInfo()">
                            <option value="" selected disabled>পছন্দ করুন</option>
                        </select>
                        <i class="bi bi-chevron-down position-absolute" style="right: 15px; top: 12px; color: #2ecc71; pointer-events: none;"></i>
                    </div>
                </div>

                <div class="payment-info mb-4" id="payment_info_box" style="display: none;">
                    <div id="method_details">
                        <div class="small text-white-50" id="method_type">--</div>
                        <div class="d-flex align-items-center justify-content-between mt-1">
                            <strong class="fs-4 text-white" id="payment_number">01XXXXXXXXX</strong>
                            <button type="button" class="btn btn-sm" style="background: rgba(255,255,255,0.1); color: #2ecc71;" onclick="copyNumber()">
                                <i class="bi bi-copy"></i> Copy
                            </button>
                        </div>
                    </div>
                </div>

                <script src="js/config.js"></script>
                <script>
                    window.onload = function() {
                        const select = document.getElementById('payment_method');
                        for (let key in paymentMethods) {
                            let option = document.createElement('option');
                            option.value = key;
                            option.text = paymentMethods[key].dropdownLabel;
                            select.appendChild(option);
                        }
                    };

                    function showAlert(msg) {
                        const container = document.getElementById('alert_container');
                        const alertMsg = document.getElementById('alert_message');
                        alertMsg.innerText = msg;
                        container.style.display = 'block';
                        window.scrollTo(0, 0);
                        setTimeout(() => { container.style.display = 'none'; }, 5000);
                    }

                    function showSuccessModal() {
                        document.getElementById('successModal').style.display = 'flex';
                        document.getElementById('successMessage').innerText = 'আপনার অর্ডারটি সফলভাবে গ্রহণ করা হয়েছে। আমরা শীঘ্রই আপনার সাথে যোগাযোগ করবো!';
                    }

                    function closeSuccessModal() {
                        document.getElementById('successModal').style.display = 'none';
                        window.location.href = 'index.html';
                    }

                    function showPaymentInfo() {
                        const method = document.getElementById('payment_method').value;
                        const box = document.getElementById('payment_info_box');
                        const number = document.getElementById('payment_number');
                        const type = document.getElementById('method_type');

                        if (paymentMethods[method]) {
                            box.style.display = 'block';
                            type.innerText = paymentMethods[method].type;
                            number.innerText = paymentMethods[method].number;
                        } else {
                            box.style.display = 'none';
                        }
                    }

                    function copyNumber() {
                        const number = document.getElementById('payment_number').innerText;
                        navigator.clipboard.writeText(number).then(() => {
                            alert('নাম্বারটি কপি হয়েছে!');
                        });
                    }

                    function validateForm() {
                        const phone = document.getElementById('phone_input');
                        const method = document.getElementById('payment_method');
                        const trxid = document.getElementById('trxid_input');

                        if (phone.value.length < 11) {
                            showAlert('সঠিক ফোন নম্বর প্রদান করুন।');
                            phone.focus();
                            return false;
                        }
                        if (!method.value) {
                            showAlert('পেমেন্ট মাধ্যম সিলেক্ট করুন।');
                            method.focus();
                            return false;
                        }
                        if (trxid.value.length < 5) {
                            showAlert('সঠিক ট্রানজেকশন আইডি (TrxID) প্রদান করুন।');
                            trxid.focus();
                            return false;
                        }
                        showSuccessModal();
                        return false;
                    }
                </script>

                <!-- Success Notification Modal -->
                <div id="successModal" class="modal" style="display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; align-items: center; justify-content: center; background: rgba(0,0,0,0.8); z-index: 9999;">
                    <div class="modal-content" style="background: #0a192f; border: 1px solid #2ecc71; border-radius: 20px; text-align: center; padding: 3rem 2rem; max-width: 400px; width: 90%;">
                        <div style="margin-bottom: 1.5rem;">
                            <div style="width: 80px; height: 80px; background: rgba(46, 204, 113, 0.1); color: #2ecc71; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 3rem; margin: 0 auto; border: 4px solid #2ecc71;">
                                ✓
                            </div>
                        </div>
                        <h2 style="color: #fff; margin-bottom: 1rem; font-weight: 700;">ধন্যবাদ!</h2>
                        <p id="successMessage" style="color: rgba(255,255,255,0.7); margin-bottom: 2rem; font-size: 1.1rem; line-height: 1.5;"></p>
                        <button onclick="closeSuccessModal()" class="btn btn-tiktok w-100 fs-5" style="padding: 0.8rem;">ঠিক আছে</button>
                    </div>
                </div>

                <div class="mb-4">
                    <label class="form-label text-white-50 small"><i class="bi bi-caret-right-fill me-1 text-tiktok"></i>ট্রানজেকশন আইডি (TrxID)</label>
                    <input type="text" id="trxid_input" class="form-control" placeholder="8N72KL9X">
                    <small class="mt-2 d-block small" style="color: #fff;">
                        <i class="bi bi-info-circle me-1"></i> টাকা পাঠানোর পর মেসেজে <b style="color: #25F4EE;"><i>TrxID</i></b> পাবেন।
                    </small>
                </div>

                <button type="submit" class="btn btn-tiktok w-100 fs-5 mt-2">
                    অর্ডার কনফার্ম করুন <i class="bi bi-arrow-right-circle ms-2"></i>
                </button>
            </form>
            <a href="index.html" class="d-block text-center mt-4 text-white-50 text-decoration-none small">ফিরে যান</a>
        </div>
    </div>
</body>
</html>
